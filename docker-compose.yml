services:

  mysql:
    image: mysql:8
    container_name: mysql-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: booksdb
    ports:
      - "3306:3306"
    command: --bind-address=0.0.0.0

  backend:
    build: ./backend
    container_name: backend-app
    restart: always
    depends_on:
      - mysql
    ports:
      - "3200:3200"
    environment:
      DB_HOST: mysql
      DB_USER: root
      DB_PASSWORD: root123
      DB_NAME: booksdb

  frontend:
    build: ./frontend
    container_name: frontend-app
    restart: always
    depends_on:
      - backend
    ports:
      - "80:3000"
